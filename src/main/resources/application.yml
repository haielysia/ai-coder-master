spring:
  application:
    name: ai-coder-master
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_coder_master
    username: root
    password: Elysia520
  profiles:
    active: local
  # redis
  data:
    redis:
      host: 192.168.44.132
      port: 6379
      password: Elysia520
      ttl: 3600
      username: default
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ai.aicodermaster.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    chat-model:
      max-tokens: 8192
      max-retries: 3




